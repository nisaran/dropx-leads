<!DOCTYPE html>
  </div>

  <div class="card">
    <h2>Leads</h2>
    <div id="leads">Loading...</div>
  </div>

  <script>

    const API_URL = 'https://script.google.com/macros/s/AKfycbxhCWZfHaNhaNJgfAZaUad6EhdtGj5yWRhw2mbFqN8d_1RRcQwJTFQFm869I0w0vr2SFw/exec';

    async function api(action, payload = {}) {
      try {

        const response = await fetch(API_URL + '?action=' + action, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(payload)
        });

        return await response.json();

      } catch (err) {
        console.error(err);
        alert('API Error');
      }
    }


    async function loadDashboard() {

      const data = await api('dashboard');

      document.getElementById('dashboard').innerHTML = `
        <p>Total Leads: ${data.total || 0}</p>
        <p>Pending: ${data.pending || 0}</p>
        <p>Interview: ${data.interview || 0}</p>
      `;
    }


    async function loadLeads() {

      const leads = await api('leads');

      const container = document.getElementById('leads');

      if (!Array.isArray(leads)) {
        container.innerHTML = 'No leads found';
        return;
      }

      container.innerHTML = '';

      leads.forEach(lead => {

        const div = document.createElement('div');
        div.className = 'lead';

        div.innerHTML = `
          <h3>${lead.full_name || 'No Name'}</h3>
          <p>${lead.phone || ''}</p>
          <p>${lead.station_name || ''}</p>

          <select onchange="updateStatus('${lead.lead_id}', this.value)">
            <option value="">Select Status</option>
            <option value="No Response">No Response</option>
            <option value="Call Back">Call Back</option>
            <option value="Interview Scheduled">Interview Scheduled</option>
            <option value="Not Interested">Not Interested</option>
          </select>
        `;

        container.appendChild(div);
      });
</html>
